<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Living Aegis Prototype Lab</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">Prototype Lab</p>
        <h1 id="page-title">Living Aegis Prototype Lab</h1>
        <p class="lede">Living Aegis Origin 제작을 위한 prototype 실험장입니다.</p>
      </section>

      <section class="repository-note" aria-labelledby="repository-role-title">
        <h2 id="repository-role-title">저장소 역할</h2>
        <p>
          이 저장소는 메인 게임이 아니라 prototype 실험장입니다. 메인 게임은
          <code>living-aegis-origin</code>에서 관리하고, simulator는
          <code>living-aegis-simulator</code>에서 관리합니다.
        </p>
      </section>

      <section class="prototype-list" aria-labelledby="prototype-list-title">
        <h2 id="prototype-list-title">현재 prototypes</h2>
        <a class="prototype-card" href="prototype-01-basic-defense/">
          <span class="prototype-number">Prototype 01</span>
          <span class="prototype-name">Basic Defense</span>
          <span class="prototype-status">상태: scaffold only</span>
          <span class="prototype-path">prototype-01-basic-defense/</span>
        </a>
      </section>
    </main>
  </body>
</html>
